<html>
<head>
<style>
td {
text-align: center;
}
</style>

<body>
<table>
<form name="calc">
<tr><td colspan="4">
<input type="text" name="top" size="14"><input type="button" name="clear" value=" AC " onClick="calc.top.value = ''">
</td></tr>


<tr>
<td><input type="button" name="seven" value=" 7 " onClick="calc.top.value += 7"></td>
<td><input type="button" name="eight" value=" 8 " onClick="calc.top.value += 8"</td>
<td><input type="button" name="nine" value=" 9 " onClick="calc.top.value += 9"></td>
<td><input type="button" name="divide" value=" / " onClick="calc.top.value += '/'"></td>
</tr>

<tr>
<td><input type="button" name="four" value=" 4 " onClick="calc.top.value += 4"></td>
<td><input type="button" name="five" value=" 5 " onClick="calc.top.value += 5"></td>
<td><input type="button" name="six" value=" 6 " onClick="calc.top.value += 6"></td>
<td><input type="button" name="times" value=" x " onClick="calc.top.value += '*'"></td>
</tr>

<tr>
<td><input type="button" name="one" value=" 1 " onClick="calc.top.value += 1"></td>
<td><input type="button" name="two" value=" 2 " onClick="calc.top.value += 2"></td>
<td><input type="button" name="three" value=" 3 " onClick="calc.top.value += 3"></td>
<td><input type="button" name="minus" value=" - " onClick="calc.top.value += '-'"></td>
</tr>

<tr>
<td><input type="button" name="zero" value=" 0 " onClick="calc.top.value += 0"></td>
<td><input type="button" name="dot" value=" . " onClick="calc.top.value += '.'"></td>
<td><input type="button" name="equals" value=" = " width="100%" OnClick="calc.top.value = eval(calc.top.value)"></td>
<td><input type="button" name="plus" value=" + " onClick="calc.top.value += '+'"></td>

</form>
</table>

</body>
</html>
